name: rickbo_core
description: Shared models, API client, zones, fares, and theme for Rickbo apps.
version: 0.0.1
publish_to: none

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.4.0
  google_fonts: ^6.1.0
  shared_preferences: ^2.2.0
  socket_io_client: ^2.0.3+1

flutter:
  uses-material-design: true
